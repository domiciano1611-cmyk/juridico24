<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | Dashboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-item { position: relative; }
        .sidebar-item::after {
            content: attr(data-label); position: absolute; left: 110%; top: 50%; transform: translateY(-50%);
            background: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
        }
        .sidebar-item:hover::after { opacity: 1; }
        .active-menu { background-color: #4f46e5; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .expand-mode { position: fixed; inset: 20px; z-index: 100; height: calc(100vh - 40px) !important; width: calc(100vw - 40px) !important; }
        
        /* Mic & Loading Animations */
        .mic-active { color: #ef4444 !important; animation: pulse-mic 1.5s infinite; font-weight: bold; }
        @keyframes pulse-mic { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .loading-logo { animation: rotate-pulse 2s infinite ease-in-out; }
        @keyframes rotate-pulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0.8; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-20 bg-white border-r border-slate-100 flex flex-col items-center shrink-0">
        <div class="py-8">
            <div class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
            </div>
        </div>
        <nav class="flex-1 space-y-4 mt-4 w-full px-4 text-center">
            <a href="#" data-label="Dashboard" class="sidebar-item active-menu flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
            <a href="#" data-label="Clientes" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </a>
            <a href="#" data-label="Processos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </a>
            <a href="#" data-label="Pagamentos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-20 glass-header px-10 flex items-center justify-between shrink-0">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Gerador de Petição</h2>
                <p class="text-xs text-slate-400 font-medium tracking-wide">Interface Clean v4.0</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[24px] shadow-sm border border-slate-100">
                        <div class="space-y-6">
                            <div>
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Área do Direito</label>
                                <select id="tipoAcao" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-semibold">
                                    <option value="Trabalhista">Direito do Trabalho</option>
                                    <option value="Cível">Direito Cível</option>
                                    <option value="Família">Direito de Família</option>
                                    <option value="Consumidor">Direito do Consumidor</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="relative">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerente</label>
                                    <div class="relative">
                                        <input type="text" id="cliente" placeholder="Nome" class="w-full mt-2 p-4 pr-12 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                        <button class="absolute right-3 top-[18px] text-indigo-500 hover:text-indigo-700">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="relative">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerido</label>
                                    <div class="relative">
                                        <input type="text" id="reu" placeholder="Réu" class="w-full mt-2 p-4 pr-12 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                        <button class="absolute right-3 top-[18px] text-indigo-500 hover:text-indigo-700">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="relative">
                                <div class="flex justify-between items-center ml-1">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Fatos do Caso</label>
                                    <button onclick="toggleDictation()" id="micBtn" class="text-indigo-500 hover:text-indigo-700 transition-all flex items-center gap-1 text-[10px] font-bold">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                                        DITAR ÁUDIO
                                    </button>
                                </div>
                                <textarea id="fatos" rows="7" placeholder="Descreva os acontecimentos..." class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm leading-relaxed font-medium"></textarea>
                            </div>

                            <button onclick="gerarPeticao()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95">
                                Gerar Petição com IA
                            </button>
                        </div>
                    </div>
                </div>

                <div id="document-container" class="bg-white rounded-[32px] shadow-sm flex flex-col overflow-hidden border border-slate-100 transition-all duration-300">
                    <div class="p-6 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center px-8 shrink-0">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Visualização da Minuta</span>
                        <div class="flex gap-4">
                            <button onclick="salvarMinuta()" class="text-[10px] font-bold text-emerald-600 hover:text-emerald-800 uppercase">Salvar</button>
                            <button onclick="toggleExpand()" class="text-[10px] font-bold text-slate-400 hover:text-indigo-600 uppercase">Foco</button>
                            <button onclick="copyText()" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 uppercase">Copiar</button>
                        </div>
                    </div>
                    
                    <div id="resultado" class="relative p-10 text-sm leading-relaxed text-slate-600 overflow-y-auto flex-1 flex flex-col">
                        <div id="waiting-state" class="m-auto text-center space-y-4">
                            <div class="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                            </div>
                            <h3 class="text-slate-800 font-bold">Aguardando Fatos</h3>
                            <p class="text-slate-400 max-w-[200px] mx-auto text-xs leading-5">Narre ou escreva os acontecimentos ao lado para gerar o documento.</p>
                        </div>

                        <div id="loading-state" class="hidden m-auto text-center">
                            <div class="bg-indigo-600 h-16 w-16 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-100 mx-auto loading-logo">
                                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                            </div>
                            <p class="mt-6 text-indigo-600 font-bold text-xs tracking-widest uppercase">IA Redigindo...</p>
                        </div>

                        <div id="final-text" class="hidden whitespace-pre-wrap font-serif text-base text-slate-700"></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const GROQ_API_KEY = "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";
        let recognition;
        let isListening = false;

        // DITADO
        if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('speechRecognition')) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = "pt-BR";

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                if (finalTranscript) {
                    const fatosField = document.getElementById('fatos');
                    fatosField.value += (fatosField.value ? " " : "") + finalTranscript;
                }
            };

            recognition.onstart = () => {
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.add('mic-active');
                micBtn.innerHTML = '● OUVINDO...';
            };

            recognition.onend = () => {
                const micBtn = document.getElementById('micBtn');
                micBtn.classList.remove('mic-active');
                micBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg> DITAR ÁUDIO';
                isListening = false;
            };
        }

        function toggleDictation() {
            if (!recognition) return alert("Navegador não suportado.");
            isListening ? recognition.stop() : recognition.start();
            isListening = !isListening;
        }

        function toggleExpand() {
            document.getElementById('document-container').classList.toggle('expand-mode');
        }

        function salvarMinuta() {
            const text = document.getElementById('final-text').innerText;
            if(!text) return alert("Gere uma petição primeiro!");
            alert("Minuta salva com sucesso no cadastro do requerente!");
        }

        async function gerarPeticao() {
            const fatos = document.getElementById('fatos').value;
            if (!fatos) return alert("Descreva os fatos primeiro.");

            const waitState = document.getElementById('waiting-state');
            const loadState = document.getElementById('loading-state');
            const finalText = document.getElementById('final-text');
            const btn = document.getElementById('btnGerar');

            waitState.classList.add('hidden');
            finalText.classList.add('hidden');
            loadState.classList.remove('hidden');
            btn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `Aja como Advogado Sênior. Escreva uma Petição Inicial para ${document.getElementById('tipoAcao').value}. Requerente: ${document.getElementById('cliente').value}. Requerido: ${document.getElementById('reu').value}. Fatos: ${fatos}.` }]
                    })
                });
                const data = await response.json();
                
                loadState.classList.add('hidden');
                finalText.innerText = data.choices[0].message.content;
                finalText.classList.remove('hidden');
            } catch (e) {
                alert("Erro ao gerar: " + e.message);
                loadState.classList.add('hidden');
                waitState.classList.remove('hidden');
            } finally {
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('final-text').innerText;
            if(!text) return;
            navigator.clipboard.writeText(text);
            alert("Copiado!");
        }
    </script>
</body>
</html>
