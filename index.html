<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="border-b bg-white/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">Jurídico<span class="text-indigo-600">24</span></span>
            </div>
            <div class="flex items-center gap-4">
                <input type="password" id="apiKey" placeholder="Sua Groq API Key" class="text-xs border p-2 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="space-y-6">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
                        <span>📝</span> Dados da Inicial
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Ação</label>
                            <select id="tipoAcao" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                                <option value="Trabalhista">Justiça do Trabalho (Reclamação)</option>
                                <option value="Cível">Justiça Cível (Indenização/Obrigação)</option>
                                <option value="Família">Direito de Família (Alimentos/Divórcio)</option>
                                <option value="Consumidor">Direito do Consumidor</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Requerente (Cliente)</label>
                                <input type="text" id="cliente" placeholder="Nome completo" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Requerido (Réu)</label>
                                <input type="text" id="reu" placeholder="Empresa ou Pessoa" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Narre os Fatos</label>
                            <textarea id="fatos" rows="6" placeholder="Ex: O cliente trabalhou por 2 anos sem registro, fazia horas extras e não recebia..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                        </div>

                        <button onclick="gerarPeticao()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all flex justify-center items-center gap-2">
                            🚀 Gerar Petição com IA
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 text-slate-100 min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-semibold uppercase tracking-widest text-slate-400">Minuta Gerada</h2>
                    <button onclick="copyText()" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-slate-600 transition">Copiar Texto</button>
                </div>
                <div id="resultado" class="text-sm leading-relaxed overflow-y-auto whitespace-pre-wrap flex-1 text-slate-300">
                    Os dados da petição aparecerão aqui após o processamento...
                </div>
            </div>

        </div>
    </main>

    <script>
        async function gerarPeticao() {
            const apiKey = document.getElementById('apiKey').value;
            const tipo = document.getElementById('tipoAcao').value;
            const cliente = document.getElementById('cliente').value;
            const reu = document.getElementById('reu').value;
            const fatos = document.getElementById('fatos').value;
            const btn = document.getElementById('btnGerar');
            const resDiv = document.getElementById('resultado');

            if (!apiKey) { alert("Por favor, insira sua API Key da Groq no topo da página."); return; }
            
            btn.innerText = "Processando Jurídico AI...";
            btn.disabled = true;
            resDiv.innerText = "Aguarde, redigindo a petição inicial...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "user",
                            content: `Atue como um advogado sênior. Escreva uma petição inicial de nível ${tipo}. 
                            Requerente: ${cliente}. Requerido: ${reu}. 
                            Fatos narrados: ${fatos}. 
                            Estruture com: Endereçamento, Qualificação, Fatos, Direito e Pedidos. Seja formal.`
                        }]
                    })
                });

                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
            } catch (error) {
                resDiv.innerText = "Erro ao conectar com a IA: " + error.message;
            } finally {
                btn.innerText = "🚀 Gerar Petição com IA";
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('resultado').innerText;
            navigator.clipboard.writeText(text);
            alert("Copiado para a área de transferência!");
        }
    </script>
</body>
</html>
