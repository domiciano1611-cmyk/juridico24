<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | Intelligence Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-item { position: relative; }
        .sidebar-item::after {
            content: attr(data-label); position: absolute; left: 110%; top: 50%; transform: translateY(-50%);
            background: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
        }
        .sidebar-item:hover::after { opacity: 1; }
        .active-menu { background-color: #4f46e5; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .expand-mode { position: fixed; inset: 20px; z-index: 1000; height: calc(100vh - 40px) !important; width: calc(100vw - 40px) !important; }
        
        /* Estilização do Editor Quill */
        #editor-container { height: 100%; border: none !important; font-family: 'serif'; }
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #f1f5f9 !important; background: #fff; position: sticky; top: 0; z-index: 10; }
        .ql-container.ql-snow { border: none !important; font-size: 16px; }
        .ql-editor { padding: 40px !important; line-height: 1.6; color: #334155; }
        
        @keyframes pulse-mic { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .mic-active { color: #ef4444 !important; animation: pulse-mic 1.5s infinite; font-weight: bold; }
        .loading-logo { animation: rotate-pulse 2s infinite ease-in-out; }
        @keyframes rotate-pulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0.8; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-20 bg-white border-r border-slate-100 flex flex-col items-center shrink-0">
        <div class="py-8">
            <div class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
            </div>
        </div>
        <nav class="flex-1 space-y-4 mt-4 w-full px-4 text-center">
            <a href="#" data-label="Dashboard" class="sidebar-item active-menu flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
            <a href="#" data-label="Clientes" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </a>
            <a href="#" data-label="Processos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-20 glass-header px-10 flex items-center justify-between shrink-0">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Gerador de Petição <span class="text-indigo-600">Pro</span></h2>
                <p class="text-xs text-slate-400 font-medium tracking-wide">Com Editor de IA Integrado</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
                
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white p-8 rounded-[24px] shadow-sm border border-slate-100">
                        <div class="space-y-6">
                            <div>
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Área do Direito</label>
                                <select id="tipoAcao" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-semibold">
                                    <option value="Trabalhista">Direito do Trabalho</option>
                                    <option value="Cível">Direito Cível</option>
                                    <option value="Família">Direito de Família</option>
                                    <option value="Consumidor">Direito do Consumidor</option>
                                </select>
                            </div>

                            <div class="space-y-4">
                                <input type="text" id="cliente" placeholder="Nome do Requerente" class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                <input type="text" id="reu" placeholder="Nome do Requerido" class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                            </div>

                            <div class="relative">
                                <div class="flex justify-between items-center ml-1">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Fatos do Caso</label>
                                    <button onclick="toggleDictation()" id="micBtn" class="text-indigo-500 hover:text-indigo-700 transition-all flex items-center gap-1 text-[10px] font-bold">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg> DITAR
                                    </button>
                                </div>
                                <textarea id="fatos" rows="6" placeholder="Descreva os fatos..." class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm leading-relaxed font-medium"></textarea>
                            </div>

                            <button onclick="iniciarFluxo()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 disabled:opacity-50">
                                Gerar Minuta Inteligente
                            </button>
                        </div>
                    </div>
                </div>

                <div id="document-container" class="lg:col-span-8 bg-white rounded-[32px] shadow-sm flex flex-col overflow-hidden border border-slate-100 transition-all duration-300">
                    <div class="p-4 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center px-8 shrink-0">
                        <div class="flex items-center gap-3">
                            <button onclick="toggleExpand()" title="Expandir" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-indigo-600 transition-all">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                            </button>
                            <span id="label-view" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Editor de Documentos</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="window.print()" class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-[10px] font-bold text-slate-600 hover:bg-slate-50 transition-all uppercase">PDF / Imprimir</button>
                            <button onclick="salvarMinuta()" class="px-4 py-2 bg-indigo-600 rounded-xl text-[10px] font-bold text-white hover:bg-indigo-700 transition-all uppercase shadow-md shadow-indigo-100">Salvar Nuvem</button>
                        </div>
                    </div>
                    
                    <div id="resultado" class="relative overflow-y-auto flex-1 bg-slate-50/30">
                        
                        <div id="waiting-state" class="absolute inset-0 flex flex-col items-center justify-center text-center p-10">
                            <div class="bg-white w-20 h-20 rounded-3xl shadow-sm flex items-center justify-center mb-6">
                                <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <h3 class="text-slate-800 font-bold">Pronto para redigir</h3>
                            <p class="text-slate-400 max-w-[250px] mx-auto text-xs mt-2">Preencha os dados à esquerda para que nossa IA gere a minuta profissional.</p>
                        </div>

                        <div id="loading-state" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                            <div class="bg-indigo-600 h-14 w-14 rounded-2xl flex items-center justify-center shadow-xl loading-logo">
                                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                            </div>
                            <p id="loading-text" class="mt-6 text-indigo-600 font-bold text-[10px] tracking-widest uppercase">Processando Inteligência...</p>
                        </div>

                        <div id="selection-state" class="hidden p-10 z-30 relative bg-white h-full">
                            <div class="max-w-2xl mx-auto">
                                <h3 class="text-xl font-bold text-slate-800 mb-2">Precedentes Encontrados</h3>
                                <p class="text-sm text-slate-500 mb-8">Selecione quais decisões deseja integrar ao texto final.</p>
                                <div id="juris-list" class="space-y-4"></div>
                                <button onclick="gerarDocumentoFinal()" class="w-full mt-8 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100">Redigir Peça Completa</button>
                            </div>
                        </div>

                        <div id="editor-wrapper" class="hidden h-full flex flex-col">
                            <div id="toolbar-container"></div>
                            <div id="editor-container"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const GROQ_API_KEY = "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";
        let quill;

        // Inicializar Editor Quill
        function initQuill() {
            quill = new Quill('#editor-container', {
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, false] }],
                        ['bold', 'italic', 'underline'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'align': [] }],
                        ['clean']
                    ]
                },
                placeholder: 'Aguardando geração do documento...',
                theme: 'snow'
            });
        }
        initQuill();

        // Funções de UI
        function toggleExpand() { document.getElementById('document-container').classList.toggle('expand-mode'); }
        
        async function iniciarFluxo() {
            const fatos = document.getElementById('fatos').value;
            if (!fatos) return alert("Descreva os fatos primeiro.");

            toggleState('loading');
            
            try {
                const promptJuris = `Baseado nos fatos: "${fatos}", invente 3 ementas de jurisprudência perfeitas para o caso. Formate como JSON array: [{"titulo": "...", "ementa": "..."}]`;
                const response = await callAI(promptJuris, true);
                const jurisprudencias = response.jurisprudencias || Object.values(response)[0];
                renderizarSelecao(jurisprudencias);
                toggleState('selection');
            } catch (e) {
                alert("Erro: " + e.message);
                toggleState('waiting');
            }
        }

        function renderizarSelecao(lista) {
            const container = document.getElementById('juris-list');
            container.innerHTML = '';
            lista.forEach((item, index) => {
                const div = document.createElement('label');
                div.className = 'block cursor-pointer group';
                div.innerHTML = `
                    <input type="checkbox" class="hidden peer" value="${index}" checked>
                    <div class="p-5 border border-slate-200 rounded-2xl bg-white group-hover:border-indigo-300 transition-all peer-checked:ring-2 peer-checked:ring-indigo-500 peer-checked:bg-indigo-50/30">
                        <h4 class="text-xs font-bold text-indigo-600 mb-2 uppercase">${item.titulo}</h4>
                        <p class="text-[13px] text-slate-600 leading-relaxed">${item.ementa}</p>
                    </div>`;
                div.dataset.texto = `${item.titulo}: ${item.ementa}`;
                container.appendChild(div);
            });
        }

        async function gerarDocumentoFinal() {
            const selecionados = Array.from(document.querySelectorAll('#juris-list input:checked'))
                                    .map(input => input.closest('label').dataset.texto);

            toggleState('loading');
            document.getElementById('loading-text').innerText = "A IA está redigindo seu documento...";

            const promptFinal = `Aja como Advogado Sênior. Escreva uma Petição Inicial completa para ${document.getElementById('tipoAcao').value}. Requerente: ${document.getElementById('cliente').value} | Requerido: ${document.getElementById('reu').value}. Fatos: ${document.getElementById('fatos').value}. Integre organicamente no tópico DO DIREITO: ${selecionados.join(' | ')}. Retorne em HTML simples (h1, h2, p).`;

            try {
                const response = await callAI(promptFinal, false);
                toggleState('editor');
                quill.clipboard.dangerouslyPasteHTML(response);
                document.getElementById('label-view').innerText = "Editor de Peça Processual";
            } catch (e) {
                alert("Erro na redação.");
                toggleState('selection');
            }
        }

        // Helpers
        async function callAI(prompt, isJson) {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: prompt }],
                    ...(isJson && { response_format: { type: "json_object" } })
                })
            });
            const data = await res.json();
            return isJson ? JSON.parse(data.choices[0].message.content) : data.choices[0].message.content;
        }

        function toggleState(state) {
            const states = ['waiting-state', 'loading-state', 'selection-state', 'editor-wrapper'];
            states.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(state + '-state' + (state === 'editor' ? '-wrapper' : '')).classList.remove('hidden');
        }

        function salvarMinuta() { alert("Documento salvo na nuvem com sucesso!"); }
    </script>
</body>
</html>
