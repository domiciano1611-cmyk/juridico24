<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | Dashboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-item:hover { background-color: rgba(99, 102, 241, 0.1); color: #6366f1; }
        .active-menu { background-color: #6366f1; color: white ! sincerity; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 flex items-center gap-3">
            <div class="bg-indigo-600 p-2 rounded-lg text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
            </div>
            <span class="text-xl font-bold tracking-tight">Jurídico<span class="text-indigo-600">24</span></span>
        </div>

        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl active-menu font-medium transition-all">
                <span>🏠</span> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl sidebar-item font-medium transition-all text-slate-600">
                <span>👥</span> Clientes
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl sidebar-item font-medium transition-all text-slate-600">
                <span>⚖️</span> Processos
            </a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-xl sidebar-item font-medium transition-all text-slate-600">
                <span>💳</span> Pagamentos
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="bg-slate-50 p-3 rounded-xl text-xs text-slate-500">
                AI Engine: Llama 3.3 70B<br>
                Status: <span class="text-green-600 font-bold">Conectado</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        
        <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 px-8 flex items-center justify-between sticky top-0">
            <h2 class="font-semibold text-slate-700">Gerador de Petição Inicial</h2>
            <div class="flex items-center gap-4 text-sm text-slate-500">
                <span>v2.0</span>
                <div class="w-8 h-8 rounded-full bg-indigo-100 border border-indigo-200"></div>
            </div>
        </header>

        <div class="p-8">
            <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Tipo de Ação</label>
                                <select id="tipoAcao" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                                    <option value="Trabalhista">Justiça do Trabalho</option>
                                    <option value="Cível">Justiça Cível</option>
                                    <option value="Família">Direito de Família</option>
                                    <option value="Consumidor">Direito do Consumidor</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Requerente</label>
                                    <input type="text" id="cliente" placeholder="Nome do Cliente" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Requerido</label>
                                    <input type="text" id="reu" placeholder="Nome do Réu" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Narração dos Fatos</label>
                                <textarea id="fatos" rows="8" placeholder="Descreva os detalhes do caso..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
                            </div>

                            <button onclick="gerarPeticao()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex justify-center items-center gap-2">
                                ✨ Gerar com Inteligência Artificial
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                    <div class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Petição Gerada</span>
                        <button onclick="copyText()" class="text-xs text-indigo-400 hover:text-white transition">Copiar Tudo</button>
                    </div>
                    <div id="resultado" class="p-6 text-sm leading-relaxed text-slate-300 overflow-y-auto whitespace-pre-wrap flex-1 italic">
                        Preencha os dados ao lado para redigir o documento...
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // CHAVE API INTEGRADA
        const GROQ_API_KEY = "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";

        async function gerarPeticao() {
            const tipo = document.getElementById('tipoAcao').value;
            const cliente = document.getElementById('cliente').value;
            const reu = document.getElementById('reu').value;
            const fatos = document.getElementById('fatos').value;
            const btn = document.getElementById('btnGerar');
            const resDiv = document.getElementById('resultado');

            if (!fatos) { alert("Por favor, narre os fatos."); return; }
            
            btn.innerText = "Redigindo...";
            btn.disabled = true;
            resDiv.innerText = "A inteligência artificial está processando os dados jurídicos...";
            resDiv.classList.remove('italic');

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{
                            role: "user",
                            content: `Atue como um advogado brasileiro especialista. Escreva uma petição inicial profissional de nível ${tipo}. 
                            Requerente: ${cliente}. Requerido: ${reu}. 
                            Fatos: ${fatos}. 
                            Estruture obrigatoriamente com: Endereçamento ao juízo competente, Qualificação das partes, Dos Fatos, Do Direito e Dos Pedidos finais. Use linguagem jurídica formal.`
                        }]
                    })
                });

                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
            } catch (error) {
                resDiv.innerText = "Erro no sistema: " + error.message;
            } finally {
                btn.innerText = "✨ Gerar com Inteligência Artificial";
                btn.disabled = false;
            }
        }

        function copyText() {
            const text = document.getElementById('resultado').innerText;
            navigator.clipboard.writeText(text);
            alert("Copiado!");
        }
    </script>
</body>
</html>
