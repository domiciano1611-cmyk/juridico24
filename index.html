<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | Intelligence Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-item { position: relative; }
        .sidebar-item::after {
            content: attr(data-label); position: absolute; left: 110%; top: 50%; transform: translateY(-50%);
            background: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
        }
        .sidebar-item:hover::after { opacity: 1; }
        .active-menu { background-color: #4f46e5; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .expand-mode { position: fixed; inset: 20px; z-index: 100; height: calc(100vh - 40px) !important; width: calc(100vw - 40px) !important; }
        
        .mic-active { color: #ef4444 !important; animation: pulse-mic 1.5s infinite; font-weight: bold; }
        @keyframes pulse-mic { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        .circle-progress { fill: none; stroke: #4f46e5; stroke-width: 8; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dasharray 1s ease-in-out; }
        .circle-bg { fill: none; stroke: #f1f5f9; stroke-width: 8; }

        .loading-logo { animation: rotate-pulse 2s infinite ease-in-out; }
        @keyframes rotate-pulse {
            0% { transform: scale(1) rotate(0deg); opacity: 0.8; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 0.8; }
        }

        #editor-container { height: 100%; border: none !important; font-family: 'serif'; font-size: 16px; }
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #f1f5f9 !important; background: #fff; }
        .ql-editor { padding: 30px !important; }
        .juris-item input:checked + div { border-color: #4f46e5; background-color: #f5f3ff; }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-20 bg-white border-r border-slate-100 flex flex-col items-center shrink-0">
        <div class="py-8">
            <div class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
            </div>
        </div>
        <nav class="flex-1 space-y-4 mt-4 w-full px-4 text-center">
            <a href="#" data-label="Dashboard" class="sidebar-item active-menu flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
            <a href="#" data-label="Clientes" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </a>
            <a href="#" data-label="Processos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </a>
            <a href="javascript:void(0)" onclick="abrirPagamento()" data-label="Pagamentos (PagSeguro)" class="sidebar-item text-slate-400 hover:text-emerald-500 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-20 glass-header px-10 flex items-center justify-between shrink-0">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Jurídico <span class="text-indigo-600">24</span></h2>
                <p class="text-xs text-slate-400 font-medium tracking-wide">Com Jurimetria & Editor IA</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[24px] shadow-sm border border-slate-100">
                        <div class="space-y-6">
                            <div>
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Área do Direito</label>
                                <select id="tipoAcao" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-semibold">
                                    <option value="Trabalhista">Direito do Trabalho</option>
                                    <option value="Cível">Direito Cível</option>
                                    <option value="Família">Direito de Família</option>
                                    <option value="Consumidor">Direito do Consumidor</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerente</label>
                                    <input type="text" id="cliente" placeholder="Nome" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                </div>
                                <div>
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerido</label>
                                    <input type="text" id="reu" placeholder="Réu" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                </div>
                            </div>

                            <div class="relative">
                                <div class="flex justify-between items-center ml-1">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Fatos do Caso</label>
                                    <button onclick="toggleDictation()" id="micBtn" class="text-indigo-500 hover:text-indigo-700 transition-all flex items-center gap-1 text-[10px] font-bold">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg> DITAR ÁUDIO
                                    </button>
                                </div>
                                <textarea id="fatos" rows="7" placeholder="Descreva os fatos..." class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm leading-relaxed font-medium"></textarea>
                            </div>

                            <button onclick="iniciarFluxo()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                                Analisar & Gerar com Jurisprudência
                            </button>
                        </div>
                    </div>
                </div>

                <div id="document-container" class="bg-white rounded-[32px] shadow-sm flex flex-col overflow-hidden border border-slate-100 transition-all duration-300">
                    <div class="p-6 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center px-8 shrink-0">
                        <div class="flex items-center gap-3">
                            <button onclick="toggleExpand()" title="Expandir" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-indigo-600 transition-all active:scale-90">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                            </button>
                            <span id="label-view" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Painel Inteligente</span>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="salvarMinuta()" class="text-[10px] font-bold text-emerald-600 hover:text-emerald-800 uppercase">Salvar</button>
                            <button onclick="copyText()" class="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 uppercase">Copiar</button>
                        </div>
                    </div>
                    
                    <div id="resultado" class="relative text-sm leading-relaxed text-slate-600 overflow-y-auto flex-1 flex flex-col bg-white">
                        
                        <div id="waiting-state" class="m-auto text-center p-10">
                            <div class="bg-indigo-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
                                <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                            </div>
                            <h3 class="text-slate-800 font-bold">Inicie a Análise</h3>
                            <p class="text-slate-400 max-w-[200px] mx-auto text-xs">Calcularemos as chances de êxito antes da redação.</p>
                        </div>

                        <div id="jurimetria-state" class="hidden p-8 space-y-8 animate-in fade-in duration-500">
                            <div class="grid grid-cols-2 gap-6">
                                <div class="bg-indigo-50/50 p-6 rounded-3xl flex flex-col items-center">
                                    <div class="relative w-[120px] h-[120px]">
                                        <svg width="120" height="120">
                                            <circle class="circle-bg" cx="60" cy="60" r="54"></circle>
                                            <circle id="score-circle" class="circle-progress" cx="60" cy="60" r="54" stroke-dasharray="0 339.29"></circle>
                                        </svg>
                                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                                            <span id="score-text" class="text-2xl font-black text-indigo-600">0%</span>
                                        </div>
                                    </div>
                                    <p class="text-[10px] font-bold text-indigo-400 uppercase mt-4">Chance de Êxito</p>
                                </div>
                                <div class="space-y-4">
                                    <div class="bg-slate-50 p-4 rounded-2xl">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase">Tempo Médio</p>
                                        <p id="tempo-text" class="text-sm font-bold text-slate-700">--</p>
                                    </div>
                                    <div class="bg-slate-50 p-4 rounded-2xl">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase">Complexidade</p>
                                        <p id="complex-text" class="text-sm font-bold text-slate-700">--</p>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-amber-50/50 border border-amber-100 p-5 rounded-2xl">
                                <h4 class="text-amber-700 font-bold text-[10px] uppercase mb-1">Risco Processual</h4>
                                <p id="risco-text" class="text-amber-800 text-xs leading-relaxed">Analizando...</p>
                            </div>
                            <button onclick="mostrarSelecaoJuris()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all">Ver Jurisprudências & Redigir</button>
                        </div>

                        <div id="loading-state" class="hidden m-auto text-center">
                            <div class="bg-indigo-600 h-16 w-16 rounded-2xl flex items-center justify-center shadow-xl mx-auto loading-logo">
                                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                            </div>
                            <p id="loading-text" class="mt-6 text-indigo-600 font-bold text-[10px] tracking-widest uppercase">Calculando Dados...</p>
                        </div>

                        <div id="selection-state" class="hidden p-10 space-y-6">
                            <h3 class="text-slate-800 font-bold text-lg">Precedentes Recomendados</h3>
                            <div id="juris-list" class="space-y-3"></div>
                            <button id="btnGerarFinal" onclick="gerarDocumentoFinal()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold disabled:opacity-50">Gerar Peça Final</button>
                        </div>

                        <div id="editor-wrapper" class="hidden h-full flex flex-col"><div id="editor-container"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GROQ_API_KEY = "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";
        let quill;
        let recognition;
        let isListening = false;
        let lastJurimetriaData = null;

        function initQuill() {
            quill = new Quill('#editor-container', { modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic'], [{ 'list': 'ordered'}, { 'list': 'bullet' }]] }, theme: 'snow' });
        }
        initQuill();

        function abrirPagamento() {
            alert("Redirecionando para o ambiente seguro PagSeguro...");
            window.open("https://pagseguro.uol.com.br/", "_blank");
        }

        if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('speechRecognition')) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true; recognition.lang = "pt-BR";
            recognition.onresult = (e) => {
                let transcript = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) { if (e.results[i].isFinal) transcript += e.results[i][0].transcript; }
                document.getElementById('fatos').value += (document.getElementById('fatos').value ? " " : "") + transcript;
            };
            recognition.onstart = () => { document.getElementById('micBtn').classList.add('mic-active'); document.getElementById('micBtn').innerHTML = '● OUVINDO...'; };
            recognition.onend = () => { document.getElementById('micBtn').classList.remove('mic-active'); document.getElementById('micBtn').innerHTML = 'DITAR ÁUDIO'; isListening = false; };
        }
        function toggleDictation() { if (!recognition) return alert("Não suportado."); isListening ? recognition.stop() : recognition.start(); isListening = !isListening; }

        async function iniciarFluxo() {
            const fatos = document.getElementById('fatos').value;
            const btn = document.getElementById('btnGerar');
            if (!fatos) return alert("Descreva o caso.");

            // Desabilitar botão para evitar duplo clique
            btn.disabled = true;
            btn.innerText = "Analisando...";

            document.getElementById('waiting-state').classList.add('hidden');
            document.getElementById('jurimetria-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            try {
                const prompt = `Analise o caso e retorne obrigatoriamente um JSON puro: {"exito": 85, "tempo_medio": "14 meses", "complexidade": "Alta", "risco": "Explicação breve", "jurisprudencias": [{"titulo": "Tema X STJ", "ementa": "Descrição da ementa aqui"}]}. Fatos: ${fatos}`;
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }], response_format: { type: "json_object" } })
                });
                const data = await res.json();
                lastJurimetriaData = JSON.parse(data.choices[0].message.content);
                exibirJurimetria(lastJurimetriaData);
            } catch (e) { 
                alert("Erro na análise."); 
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('waiting-state').classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "Analisar & Gerar com Jurisprudência";
            }
        }

        function exibirJurimetria(dados) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('jurimetria-state').classList.remove('hidden');
            
            const circle = document.getElementById('score-circle');
            const offset = 339.29 - (dados.exito / 100 * 339.29);
            circle.style.strokeDasharray = `${339.29 - offset} 339.29`;
            
            document.getElementById('score-text').innerText = dados.exito + "%";
            document.getElementById('tempo-text').innerText = dados.tempo_medio;
            document.getElementById('complex-text').innerText = dados.complexidade;
            document.getElementById('risco-text').innerText = dados.risco;
        }

        function mostrarSelecaoJuris() {
            document.getElementById('jurimetria-state').classList.add('hidden');
            document.getElementById('selection-state').classList.remove('hidden');
            const container = document.getElementById('juris-list');
            container.innerHTML = '';
            lastJurimetriaData.jurisprudencias.forEach(item => {
                const label = document.createElement('label');
                label.className = 'juris-item block cursor-pointer';
                label.innerHTML = `<input type="checkbox" class="hidden peer" checked><div class="p-4 border rounded-2xl bg-white peer-checked:ring-2 peer-checked:ring-indigo-500"><h4 class="text-[10px] font-bold text-indigo-600 uppercase">${item.titulo}</h4><p class="text-xs text-slate-600 mt-1">${item.ementa}</p></div>`;
                label.dataset.texto = item.titulo + ": " + item.ementa;
                container.appendChild(label);
            });
        }

        async function gerarDocumentoFinal() {
            const btn = document.getElementById('btnGerarFinal');
            const selecionados = Array.from(document.querySelectorAll('.juris-item input:checked')).map(i => i.closest('.juris-item').dataset.texto);
            
            btn.disabled = true;
            document.getElementById('selection-state').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('loading-text').innerText = "Redigindo Peça Final...";

            const prompt = `Escreva uma Petição Inicial Profissional em formato HTML rico. Área: ${document.getElementById('tipoAcao').value}. Requerente: ${document.getElementById('cliente').value}. Requerido: ${document.getElementById('reu').value}. Fatos: ${document.getElementById('fatos').value}. Utilize as Jurisprudências: ${selecionados.join(' | ')}`;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }] })
                });
                const data = await res.json();
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('editor-wrapper').classList.remove('hidden');
                quill.clipboard.dangerouslyPasteHTML(data.choices[0].message.content);
            } catch (e) { 
                alert("Erro ao gerar peça."); 
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('selection-state').classList.remove('hidden');
            } finally {
                btn.disabled = false;
            }
        }

        function toggleExpand() { document.getElementById('document-container').classList.toggle('expand-mode'); }
        function copyText() { navigator.clipboard.writeText(quill.getText()); alert("Copiado!"); }
        function salvarMinuta() { alert("Minuta salva no banco de dados!"); }
    </script>
</body>
</html>
