<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurídico 24 | Dashboard AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .sidebar-item { position: relative; }
        .sidebar-item::after {
            content: attr(data-label); position: absolute; left: 110%; top: 50%; transform: translateY(-50%);
            background: #1e293b; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px;
            white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100;
        }
        .sidebar-item:hover::after { opacity: 1; }
        .active-menu { background-color: #4f46e5; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .expand-mode { position: fixed; inset: 20px; z-index: 100; height: calc(100vh - 40px) !important; width: calc(100vw - 40px) !important; }
        .mic-active { color: #ef4444 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfcfd] text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-20 bg-white border-r border-slate-100 flex flex-col items-center shrink-0">
        <div class="py-8">
            <div class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
            </div>
        </div>
        <nav class="flex-1 space-y-4 mt-4 w-full px-4 text-center">
            <a href="#" data-label="Dashboard" class="sidebar-item active-menu flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </a>
            <a href="#" data-label="Clientes" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all hover:bg-slate-50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            </a>
            <a href="#" data-label="Processos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all hover:bg-slate-50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </a>
            <a href="#" data-label="Pagamentos" class="sidebar-item text-slate-400 hover:text-indigo-600 flex items-center justify-center h-12 w-12 mx-auto rounded-xl transition-all hover:bg-slate-50">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a2 2 0 002-2V7a2 2 0 00-2-2H6a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="h-20 glass-header px-10 flex items-center justify-between shrink-0">
            <div>
                <h2 class="text-lg font-bold text-slate-800">Gerador de Petição</h2>
                <p class="text-xs text-slate-400 font-medium tracking-wide">Interface Minimalista v3.5</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-400">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
            </div>
        </header>

        <div class="flex-1 p-10 overflow-y-auto">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10">
                
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[24px] shadow-sm border border-slate-100">
                        <div class="space-y-6">
                            <div>
                                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Área do Direito</label>
                                <select id="tipoAcao" class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm font-semibold">
                                    <option value="Trabalhista">Direito do Trabalho</option>
                                    <option value="Cível">Direito Cível</option>
                                    <option value="Família">Direito de Família</option>
                                    <option value="Consumidor">Direito do Consumidor</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="relative">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerente</label>
                                    <div class="flex gap-2 mt-2">
                                        <input type="text" id="cliente" placeholder="Nome" class="flex-1 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                        <button onclick="alert('Buscar cliente...')" class="bg-indigo-50 text-indigo-600 w-12 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all font-bold text-lg shrink-0">+</button>
                                    </div>
                                </div>
                                <div class="relative">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Requerido</label>
                                    <div class="flex gap-2 mt-2">
                                        <input type="text" id="reu" placeholder="Réu" class="flex-1 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium">
                                        <button onclick="alert('Buscar réu...')" class="bg-indigo-50 text-indigo-600 w-12 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all font-bold text-lg shrink-0">+</button>
                                    </div>
                                </div>
                            </div>

                            <div class="relative">
                                <div class="flex justify-between items-center ml-1">
                                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Fatos do Caso</label>
                                    <button onclick="startDictation()" id="micBtn" class="text-indigo-400 hover:text-indigo-600 transition-all flex items-center gap-1 text-[10px] font-bold">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                                        DITAR ÁUDIO
                                    </button>
                                </div>
                                <textarea id="fatos" rows="7" placeholder="Descreva os acontecimentos..." class="w-full mt-2 p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none text-sm leading-relaxed font-medium"></textarea>
                            </div>

                            <button onclick="gerarPeticao()" id="btnGerar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-indigo-100 transition-all flex justify-center items-center gap-3 active:scale-95">
                                Gerar Petição com IA
                            </button>
                        </div>
                    </div>
                </div>

                <div id="document-container" class="bg-[#0f172a] rounded-[32px] shadow-2xl flex flex-col overflow-hidden border border-slate-800 transition-all duration-300">
                    <div class="p-6 bg-slate-900/50 border-b border-slate-800 flex justify-between items-center px-8 shrink-0">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Minuta Jurídica</span>
                        <div class="flex gap-6">
                            <button onclick="toggleExpand()" class="text-xs font-semibold text-slate-400 hover:text-white transition-all flex items-center gap-2">
                                <span id="expand-text">Expandir</span>
                            </button>
                            <button onclick="copyText()" class="text-xs font-semibold text-indigo-400 hover:text-indigo-200 transition-all">Copiar</button>
                        </div>
                    </div>
                    <div id="resultado" class="p-10 text-sm leading-8 text-slate-400 overflow-y-auto whitespace-pre-wrap flex-1 font-light tracking-wide italic">
                        Aguardando narração...
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const GROQ_API_KEY = "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";

        // FUNÇÃO DE DITADO POR VOZ
        function startDictation() {
            if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('speechRecognition')) {
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                const micBtn = document.getElementById('micBtn');
                const fatosField = document.getElementById('fatos');

                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = "pt-BR";

                recognition.onstart = () => { micBtn.classList.add('mic-active'); micBtn.innerHTML = 'OUVINDO...'; };
                
                recognition.onresult = (e) => {
                    const transcript = e.results[0][0].transcript;
                    fatosField.value += (fatosField.value ? " " : "") + transcript;
                    micBtn.classList.remove('mic-active');
                    micBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg> DITAR ÁUDIO';
                };

                recognition.onerror = () => { micBtn.classList.remove('mic-active'); micBtn.innerHTML = 'DITAR ÁUDIO'; };
                recognition.start();
            } else {
                alert("Seu navegador não suporta reconhecimento de voz.");
            }
        }

        function toggleExpand() {
            const container = document.getElementById('document-container');
            const text = document.getElementById('expand-text');
            container.classList.toggle('expand-mode');
            text.innerText = container.classList.contains('expand-mode') ? 'Sair do Foco' : 'Expandir';
        }

        async function gerarPeticao() {
            const tipo = document.getElementById('tipoAcao').value;
            const cliente = document.getElementById('cliente').value;
            const reu = document.getElementById('reu').value;
            const fatos = document.getElementById('fatos').value;
            const btn = document.getElementById('btnGerar');
            const resDiv = document.getElementById('resultado');

            if (!fatos) return alert("Narre os fatos.");
            btn.innerHTML = 'Processando...';
            btn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: `Advogado Sênior. Escreva Petição Inicial ${tipo}. Requerente: ${cliente}. Requerido: ${reu}. Fatos: ${fatos}.` }]
                    })
                });
                const data = await response.json();
                resDiv.innerText = data.choices[0].message.content;
                resDiv.classList.remove('italic');
                resDiv.classList.replace('text-slate-400', 'text-slate-200');
            } catch (e) { resDiv.innerText = "Erro: " + e.message; }
            finally { btn.innerHTML = 'Gerar Petição com IA'; btn.disabled = false; }
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('resultado').innerText);
            alert("Copiado!");
        }
    </script>
</body>
</html>
